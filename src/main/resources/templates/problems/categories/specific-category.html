<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link th:rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <script defer th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <link rel="stylesheet" th:href="@{/css/main.css}">
    <title th:text="${#strings.capitalize(category)}">Specific Category</title>
</head>
<body>
<header th:replace="~{problems/problems-index :: problems-header}"></header>
<main class="container">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/index}">Index</a></li>
            <li class="breadcrumb-item"><a th:href="@{/problems}">Problems</a></li>
            <li class="breadcrumb-item"><a th:href="@{/problems/categories}">Categories</a></li>
            <li class="breadcrumb-item active" aria-current="page"><span th:text="${#strings.capitalize(category)}">Specific Category</span></li>
        </ol>
    </nav>
    <h2 th:text="${#strings.capitalize(category)}" class="mt-4 mb-3">Specific Category</h2>
    <div class="mb-4">
        <a th:href="@{/problems/categories/{c}/compare-levels(c=${category})}"
           style="font-size: large">
            Compare Difficulty Levels
        </a>
    </div>
    <table class="table table-striped table-bordered w-auto">
        <thead>
        <tr class="table-primary">
            <th>Difficulty Level</th>
            <th>Number of Problems</th>
            <th>Totals</th>
        </tr>
        </thead>
        <tbody th:with="numbers = ${#numbers.sequence(1, 10, 1)}">
            <tr th:each="level : ${levels}">
                <td th:text="${#strings.capitalize(level)}">Level</td>
                <td>
                    <th:block th:each="number: ${numbers}">
                        <a th:href="@{/problems/generator(category=${category}, level=${level}, number=${number})}"
                           th:text="${number}">Number</a>&nbsp;
                    </th:block>
                </td>
                <td th:text="${countsByLevels.getCountByLevel(level)}">Level Total</td>
            </tr>
        </tbody>
    </table>
    <p>
        <label>Total of <th:block th:text="${#strings.capitalize(category)}">Category</th:block> Problems:
            <span th:text="${countsByLevels.total}" class="value">Total Problems</span>
        </label>
    </p>
</main>
<footer th:replace="~{home/home-index :: course-footer}">Some Footer</footer>
</body>
</html>
